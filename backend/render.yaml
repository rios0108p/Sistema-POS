services:
  - type: web
    name: pos-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: sistema_inventario
      - key: DB_PORT
        value: "4000"
      - key: JWT_SECRET
        generateValue: true
